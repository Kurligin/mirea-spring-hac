services:
  api:
    build:
      target: dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  api-migrate:
    build:
      target: dev
    volumes:
      - ./backend:/app

  postgres:
    ports:
      - "5432:5432"

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
